name: Build APK
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build with Buildozer
        uses: EnisH/buildozer-action@v1
        with:
          buildozer_version: master
          python_version: 3.8
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MyKhataApp
          path: bin/*.apk
